<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bukovar — QR kódy pro stoly (tisk)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f5f1ea;
    --surface: #ffffff;
    --text: #1a1610;
    --muted: #7a7167;
    --border: rgba(26,22,16,0.12);
    --border-strong: rgba(26,22,16,0.25);
    --accent: #b5381a;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 1.5rem; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: normal; }
  header h1 span { color: var(--accent); }
  .controls { display: flex; gap: 10px; align-items: center; }
  .controls input { padding: 8px 12px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; background: var(--surface); width: 380px; }
  .controls button { padding: 10px 18px; font-size: 14px; font-weight: 500; border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: var(--radius); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .controls button:hover { background: #9c2e14; border-color: #9c2e14; }
  .controls button.sec { background: transparent; color: var(--text); border-color: var(--border-strong); }
  .controls button.sec:hover { background: var(--surface); }
  .info { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.3rem; margin-bottom: 1.5rem; font-size: 14px; color: var(--muted); line-height: 1.5; }
  .info strong { color: var(--text); }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8mm;
  }

  .qr-card {
    background: var(--surface);
    border: 2px solid var(--text);
    border-radius: 8px;
    padding: 6mm 4mm;
    text-align: center;
    page-break-inside: avoid;
    break-inside: avoid;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4mm;
  }
  .qr-card-place {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    font-weight: 500;
  }
  .qr-card-stul {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    line-height: 1;
    color: var(--text);
  }
  .qr-card-code {
    width: 60mm;
    height: 60mm;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-card-code canvas, .qr-card-code img { width: 60mm !important; height: 60mm !important; }
  .qr-card-cta {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 1mm;
  }
  .qr-card-sub {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.3;
  }

  /* Sekce nadpis "Venku" / "Uvnitř" */
  .qr-section-title {
    grid-column: 1 / -1;
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    padding: .5rem 0;
    border-top: 1px solid var(--border);
    margin-top: .5rem;
  }
  .qr-section-title:first-child { margin-top: 0; border-top: none; }

  @media print {
    @page { size: A4; margin: 10mm; }
    body { background: #fff; padding: 0; }
    header, .info { display: none; }
    .qr-card { border: 2px solid #000; }
    .qr-section-title { color: #000; }
    .qr-grid { gap: 6mm; }
  }
</style>
</head>
<body>

<header>
  <h1>Bukovar <span>QR pro stoly</span></h1>
  <div class="controls">
    <input type="text" id="base-url" placeholder="URL base" />
    <button class="sec" onclick="regenerate()">Obnovit</button>
    <button onclick="window.print()">🖨 Tisknout</button>
  </div>
</header>

<div class="info">
  Každý QR kód obsahuje URL <code id="example-url"></code> (s parametrem stolu).
  <strong>Vytiskni na A4</strong>, vystřihni karty, nalep na stoly (laminace doporučena).
  Host po načtení uvidí stránku „Přivolat obsluhu" pro daný stůl.
  <br><br>
  <strong>Stoly:</strong> V1–V9 venku (9 ks), I1–I6 uvnitř (6 ks), celkem 15 ks.
</div>

<div class="qr-grid" id="qr-grid"></div>

<script>
  // URL base — auto-detect z aktuální URL (cisnik-qr-tisk.html → cisnik.html ve stejném adresáři)
  function defaultBase() {
    const path = location.pathname.replace(/cisnik-qr-tisk\.html.*$/, 'cisnik.html');
    return location.origin + path;
  }

  const baseInput = document.getElementById('base-url');
  baseInput.value = defaultBase();

  function buildStoly() {
    const stoly = [];
    for (let i = 1; i <= 9; i++) stoly.push({ section: 'venku', id: 'V' + i, num: i });
    for (let i = 1; i <= 6; i++) stoly.push({ section: 'uvnitr', id: 'I' + i, num: i });
    return stoly;
  }

  function placeLabel(section) {
    return section === 'venku' ? '🪟 Venku' : '🏠 Uvnitř';
  }

  function regenerate() {
    const base = baseInput.value.trim();
    document.getElementById('example-url').textContent = base + '?stul=V1';
    const grid = document.getElementById('qr-grid');
    grid.innerHTML = '';

    const stoly = buildStoly();
    let lastSection = null;

    stoly.forEach(function(s) {
      if (s.section !== lastSection) {
        const title = document.createElement('div');
        title.className = 'qr-section-title';
        title.textContent = (s.section === 'venku' ? '🪟 Venku' : '🏠 Uvnitř') +
                            ' — ' + (s.section === 'venku' ? '9 stolů' : '6 stolů');
        grid.appendChild(title);
        lastSection = s.section;
      }

      const card = document.createElement('div');
      card.className = 'qr-card';
      card.innerHTML =
        '<div class="qr-card-place">' + placeLabel(s.section) + '</div>' +
        '<div class="qr-card-stul">Stůl ' + s.num + '</div>' +
        '<div class="qr-card-code" id="qr-' + s.id + '"></div>' +
        '<div class="qr-card-cta">🔔 Přivolejte obsluhu</div>' +
        '<div class="qr-card-sub">Načtěte kód mobilem · Bukovar</div>';
      grid.appendChild(card);

      const url = base + '?stul=' + s.id;
      try {
        new QRCode(document.getElementById('qr-' + s.id), {
          text: url,
          width: 240,
          height: 240,
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch (e) {
        document.getElementById('qr-' + s.id).textContent = 'Chyba: ' + e.message;
      }
    });
  }

  baseInput.addEventListener('change', regenerate);
  regenerate();
</script>

</body>
</html>
