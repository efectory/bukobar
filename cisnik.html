<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#1a1610">
<title>Bukovar — mobilní číšník</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="menu.js"></script>
<style>
  :root {
    --bg: #f5f1ea;
    --surface: #ffffff;
    --text: #1a1610;
    --muted: #7a7167;
    --border: rgba(26,22,16,0.12);
    --border-strong: rgba(26,22,16,0.25);
    --accent: #b5381a;
    --accent-light: #fdecea;
    --success-bg: #edf7f0;
    --success-text: #1a6b3a;
    --error-bg: #fdecea;
    --error-text: #a4101b;
    --radius: 12px;
    --radius-lg: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    background: var(--text);
    color: #f5f1ea;
    padding: 1rem 1.4rem;
    text-align: center;
    flex-shrink: 0;
  }
  header .logo { font-family: 'DM Serif Display', serif; font-size: 22px; letter-spacing: .02em; }
  header .logo span { color: var(--accent); }

  .screen { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .screen.active { display: flex; }

  /* ========== HOME ========== */
  #screen-home main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 1.2rem 1.2rem 1.5rem;
    gap: 1rem;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .stul-label {
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1rem;
    flex-shrink: 0;
  }
  .stul-place {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: .25rem;
  }
  .stul-name {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    line-height: 1.1;
    color: var(--text);
  }

  .call-btn, .order-btn, .history-btn {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-lg);
    cursor: pointer;
    line-height: 1.25;
    transition: background .15s, transform .1s, opacity .15s;
    flex-shrink: 0;
    width: 100%;
  }
  .call-btn:active, .order-btn:active, .history-btn:active { transform: scale(.98); }
  .call-btn:disabled, .order-btn:disabled, .history-btn:disabled { opacity: .5; cursor: not-allowed; }

  .call-btn {
    font-size: 24px;
    padding: 1.3rem 1rem;
    background: var(--accent);
    color: #fff;
    min-height: 140px;
    box-shadow: 0 6px 18px rgba(181,56,26,.22);
  }
  .call-btn:disabled { background: var(--success-bg); color: var(--success-text); box-shadow: none; cursor: default; }
  .call-btn .icon { display: block; font-size: 40px; margin-bottom: .35rem; }
  .call-btn .sub { display: block; font-size: 13px; font-weight: 400; margin-top: .4rem; opacity: .85; }

  .order-btn {
    font-size: 22px;
    padding: 1.3rem 1rem;
    background: var(--text);
    color: #f5f1ea;
    min-height: 120px;
    box-shadow: 0 6px 18px rgba(26,22,16,.18);
  }
  .order-btn .icon { display: block; font-size: 36px; margin-bottom: .3rem; }
  .order-btn .sub { display: block; font-size: 13px; font-weight: 400; margin-top: .35rem; opacity: .8; }

  .history-btn {
    font-size: 17px;
    padding: 1rem 1rem;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-strong);
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .history-btn .h-left { display: flex; align-items: center; gap: 10px; }
  .history-btn .h-icon { font-size: 20px; }
  .history-btn .h-badge { background: var(--accent); color: #fff; min-width: 26px; height: 26px; border-radius: 13px; padding: 0 8px; font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }

  .status-box {
    border-radius: var(--radius);
    padding: .85rem 1.1rem;
    font-size: 14px;
    text-align: center;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.4;
    flex-shrink: 0;
  }
  .status-box.idle { background: var(--surface); border: 1px dashed var(--border-strong); color: var(--muted); }
  .status-box.ok   { background: var(--success-bg); color: var(--success-text); border: 1px solid rgba(26,107,58,.2); }
  .status-box.err  { background: var(--error-bg);   color: var(--error-text);   border: 1px solid rgba(164,16,27,.2); }
  .status-box.work { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

  footer {
    text-align: center;
    padding: .7rem 1.4rem .9rem;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .04em;
    flex-shrink: 0;
  }

  /* Fatální chyba */
  .fatal { margin: auto; text-align: center; padding: 2rem 1.5rem; color: var(--error-text); }
  .fatal h1 { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: .8rem; }
  .fatal p { font-size: 15px; color: var(--muted); }

  /* ========== MENU + KATEGORIE + KOŠÍK + HISTORY common ========== */
  .sub-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .7rem .9rem;
    display: flex;
    align-items: center;
    gap: .6rem;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 18px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .back-btn:active { background: var(--bg); }
  .sub-header h1 { font-family: 'DM Serif Display', serif; font-size: 22px; flex: 1; line-height: 1; }
  .sub-header h1 small { font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 400; color: var(--muted); display: block; margin-top: 2px; }

  .cart-chip {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 18px;
    padding: 7px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    font-family: inherit;
    min-height: 36px;
  }
  .cart-chip:disabled { opacity: .3; background: var(--muted); cursor: default; }

  .scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 110px; }

  /* ========== MENU screen — strukturované sekce (PC style) ========== */
  .menu-section { padding: 1rem 1rem 0; }
  .menu-section:last-child { padding-bottom: 1rem; }
  .menu-section-label { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); margin-bottom: .55rem; padding: 0 4px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-2-tight { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  /* Pivo tlačítka (barevná, kopie palety z pokladny) */
  .pivo-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 16px 10px;
    border-radius: var(--radius);
    border: 2px solid transparent;
    cursor: pointer;
    min-height: 68px;
    line-height: 1.2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    position: relative;
    transition: transform .1s;
  }
  .pivo-btn:active { transform: scale(.96); }
  .pivo-btn .pivo-name { line-height: 1.15; word-break: break-word; }
  .pivo-btn .pivo-price { font-size: 12px; font-weight: 500; opacity: .8; }
  .pivo-btn .pivo-badge {
    position: absolute; top: 5px; right: 5px;
    background: var(--accent); color: #fff;
    min-width: 22px; height: 22px; border-radius: 11px;
    padding: 0 7px; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  /* Barvy piva (synced s pokladnou PC) */
  .pivo-btn.zelena       { background: #dcfce7; color: #166534; border-color: #16a34a; }
  .pivo-btn.hneda        { background: #f5e6d3; color: #92400e; border-color: #92400e; }
  .pivo-btn.seda         { background: #f1f5f9; color: #475569; border-color: #64748b; }
  .pivo-btn.zlata        { background: #fef9c3; color: #92400e; border-color: #b45309; }
  .pivo-btn.zluta        { background: #fefce8; color: #854d0e; border-color: #ca8a04; }
  .pivo-btn.oranzova     { background: #fff7ed; color: #9a3412; border-color: #ea580c; }
  .pivo-btn.modra        { background: #dbeafe; color: #1e40af; border-color: #2563eb; }
  .pivo-btn.tmave-zelena { background: #f0fdf4; color: #14532d; border-color: #166534; }

  /* Kategoriová tlačítka */
  .cat-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 18px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    min-height: 70px;
    line-height: 1.2;
    text-align: center;
    transition: background .1s, transform .1s;
    position: relative;
  }
  .cat-btn:active { transform: scale(.96); background: var(--bg); }
  .cat-btn .cat-count { font-size: 11px; color: var(--muted); display: block; margin-top: 3px; font-weight: 400; }
  .cat-btn .cat-badge {
    position: absolute; top: 5px; right: 5px;
    background: var(--accent); color: #fff;
    min-width: 22px; height: 22px; border-radius: 11px;
    padding: 0 7px; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  /* ========== CATEGORY screen — list položek v kategorii ========== */
  .menu-item {
    background: var(--surface);
    margin: 0 1rem .55rem;
    padding: .85rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: .7rem;
  }
  .menu-item:first-child { margin-top: 1rem; }
  .menu-item-info { flex: 1; min-width: 0; }
  .menu-item-name { font-size: 15px; font-weight: 500; line-height: 1.25; word-break: break-word; }
  .menu-item-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .menu-item-price { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .menu-add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
    font-family: inherit;
  }
  .menu-add-btn:active { background: #9c2e14; transform: scale(.92); }
  .menu-add-btn.in-cart { background: var(--success-text); }
  .menu-item-badge {
    background: var(--accent);
    color: #fff;
    min-width: 22px;
    height: 22px;
    border-radius: 11px;
    padding: 0 7px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 4px;
  }

  /* Sticky CTA na spodek */
  .sticky-bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: .8rem 1rem calc(env(safe-area-inset-bottom) + .8rem);
    box-shadow: 0 -4px 12px rgba(0,0,0,.06);
    z-index: 100;
  }
  .sticky-bottom-bar[hidden] { display: none !important; }
  .sticky-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 1rem;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .5rem;
    min-height: 60px;
  }
  .sticky-btn:active { background: #9c2e14; }
  .sticky-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .sticky-btn .left { display: flex; align-items: center; gap: 8px; }
  .sticky-btn .right { font-weight: 700; }

  /* ========== CART ========== */
  .cart-empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 15px; }
  .cart-item {
    background: var(--surface);
    margin: 0 1rem .6rem;
    padding: .9rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .cart-item:first-child { margin-top: 1rem; }
  .cart-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; margin-bottom: .55rem; }
  .cart-item-name { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.25; }
  .cart-item-price { font-size: 14px; color: var(--muted); white-space: nowrap; }
  .cart-item-controls { display: flex; align-items: center; gap: .6rem; }
  .qty-btn {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-btn:active { background: var(--bg); }
  .qty-value { font-size: 17px; font-weight: 600; min-width: 26px; text-align: center; }
  .qty-spacer { flex: 1; }
  .remove-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--accent);
    font-size: 14px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  .remove-btn:active { background: var(--error-bg); }

  .cart-total {
    margin: 1.2rem 1rem .8rem;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cart-total-label { font-size: 14px; color: var(--muted); }
  .cart-total-value { font-size: 22px; font-weight: 700; }

  /* ========== HISTORY (Moje objednávky) ========== */
  .history-empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 15px; }
  .history-item {
    background: var(--surface);
    margin: 1rem 1rem 0;
    padding: .9rem 1rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .history-item-head { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; margin-bottom: .6rem; }
  .history-item-meta { font-size: 12px; color: var(--muted); }
  .history-item-status { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: var(--accent-light); color: var(--accent); letter-spacing: .04em; }
  .history-item-lines { font-size: 14px; line-height: 1.5; margin-bottom: .8rem; }
  .history-item-lines div { padding: 2px 0; }
  .history-item-total { font-size: 15px; font-weight: 600; margin-bottom: .8rem; text-align: right; }
  .history-item-actions { display: flex; gap: 8px; }
  .history-item-btn {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    min-height: 44px;
  }
  .history-item-btn:active { background: var(--bg); }
  .history-item-btn.edit { border-color: var(--text); }
  .history-item-btn.delete { color: var(--accent); border-color: var(--accent); }
  .history-item-btn.delete:active { background: var(--error-bg); }

  /* ========== SENT ========== */
  #screen-sent main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 2rem 1.4rem;
    gap: 1.5rem;
    text-align: center;
  }
  .sent-icon { font-size: 72px; }
  .sent-title { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--success-text); }
  .sent-msg { font-size: 15px; color: var(--muted); line-height: 1.5; max-width: 320px; margin: 0 auto; }
  .sent-back-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 1rem 2rem;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-top: 1rem;
    align-self: center;
    min-height: 56px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Buko<span>var</span></div>
</header>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <main>
    <div class="stul-label" id="stul-label" hidden>
      <div class="stul-place" id="stul-place">—</div>
      <div class="stul-name" id="stul-name">—</div>
    </div>

    <button class="call-btn" id="call-btn" disabled>
      <span class="icon">🔔</span>
      Přivolat obsluhu
      <span class="sub" id="call-sub">Načítám…</span>
    </button>

    <button class="order-btn" id="order-btn" disabled>
      <span class="icon">📋</span>
      Objednat z menu
      <span class="sub">Pivo, jídlo, nápoje…</span>
    </button>

    <button class="history-btn" id="history-btn" hidden>
      <span class="h-left"><span class="h-icon">📜</span> Moje objednávky</span>
      <span class="h-badge" id="history-count">0</span>
    </button>

    <div class="status-box idle" id="status-box">Připraveno</div>
  </main>
  <footer>Bukovar pokladna · mobilní číšník</footer>
</div>

<!-- MENU — strukturované sekce (čepované piva, PET, kategorie) -->
<div class="screen" id="screen-menu">
  <div class="sub-header">
    <button class="back-btn" id="menu-back-btn" aria-label="Zpět">←</button>
    <h1>Menu</h1>
    <button class="cart-chip" id="menu-cart-chip" disabled>🛒 <span id="menu-cart-count">0</span></button>
  </div>
  <div class="scroll-body" id="menu-body"></div>
  <div class="sticky-bottom-bar" id="menu-cta" hidden>
    <button class="sticky-btn" id="menu-cta-btn">
      <span class="left">🛒 <span id="menu-cta-count">0</span> položek</span>
      <span class="right"><span id="menu-cta-price">0</span> Kč →</span>
    </button>
  </div>
</div>

<!-- CATEGORY — položky vybrané kategorie -->
<div class="screen" id="screen-category">
  <div class="sub-header">
    <button class="back-btn" id="cat-back-btn" aria-label="Zpět">←</button>
    <h1 id="cat-title">Kategorie</h1>
    <button class="cart-chip" id="cat-cart-chip" disabled>🛒 <span id="cat-cart-count">0</span></button>
  </div>
  <div class="scroll-body" id="cat-body"></div>
  <div class="sticky-bottom-bar" id="cat-cta" hidden>
    <button class="sticky-btn" id="cat-cta-btn">
      <span class="left">🛒 <span id="cat-cta-count">0</span> položek</span>
      <span class="right"><span id="cat-cta-price">0</span> Kč →</span>
    </button>
  </div>
</div>

<!-- CART -->
<div class="screen" id="screen-cart">
  <div class="sub-header">
    <button class="back-btn" id="cart-back-btn" aria-label="Zpět">←</button>
    <h1>Košík</h1>
  </div>
  <div class="scroll-body" id="cart-body"></div>
  <div class="sticky-bottom-bar" id="cart-send-bar" hidden>
    <button class="sticky-btn" id="cart-send-btn">
      <span class="left" id="cart-send-label">📤 Odeslat objednávku</span>
      <span class="right"><span id="cart-send-price">0</span> Kč</span>
    </button>
  </div>
</div>

<!-- HISTORY — moje objednávky -->
<div class="screen" id="screen-history">
  <div class="sub-header">
    <button class="back-btn" id="history-back-btn" aria-label="Zpět">←</button>
    <h1>Moje objednávky <small>které ještě nevyřízené</small></h1>
  </div>
  <div class="scroll-body" id="history-body"></div>
</div>

<!-- SENT -->
<div class="screen" id="screen-sent">
  <main>
    <div class="sent-icon">✓</div>
    <div class="sent-title">Objednávka odeslána</div>
    <div class="sent-msg" id="sent-msg">Obsluha vám brzy přinese objednávku.</div>
    <button class="sent-back-btn" id="sent-back-btn">Zpět na hlavní</button>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
  import { initializeFirestore, persistentLocalCache, collection, addDoc, deleteDoc, doc, serverTimestamp, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVt5sqRuJzFDclyMnwM6D0Pqz5E8449oA",
    authDomain: "bukobar-pokladna.firebaseapp.com",
    projectId: "bukobar-pokladna",
    storageBucket: "bukobar-pokladna.firebasestorage.app",
    messagingSenderId: "200112245598",
    appId: "1:200112245598:web:10db15b7bb6dc6248e5dcf"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  setPersistence(auth, browserLocalPersistence).catch(function(e){ console.warn('persistence:', e); });
  let db;
  try { db = initializeFirestore(app, { localCache: persistentLocalCache({}) }); }
  catch (e) { db = initializeFirestore(app, {}); }

  // --- Parse stolu ---
  const params = new URLSearchParams(location.search);
  const stulRaw = (params.get('stul') || '').toUpperCase().trim();
  const match = /^([VI])(\d{1,2})$/.exec(stulRaw);

  if (!match) {
    document.body.innerHTML =
      '<header><div class="logo">Buko<span style="color:#b5381a;">var</span></div></header>' +
      '<div class="fatal"><h1>Neplatný kód stolu</h1><p>QR kód není čitelný nebo je poškozen.</p></div>';
    throw new Error('invalid stul: ' + stulRaw);
  }

  const prefix = match[1];
  const num = parseInt(match[2], 10);
  const isVenku = prefix === 'V';
  const maxNum = isVenku ? 9 : 6;

  if (num < 1 || num > maxNum) {
    document.body.innerHTML =
      '<header><div class="logo">Buko<span style="color:#b5381a;">var</span></div></header>' +
      '<div class="fatal"><h1>Neplatný kód stolu</h1><p>Stůl ' + stulRaw + ' neexistuje.</p></div>';
    throw new Error('stul out of range: ' + stulRaw);
  }

  const stulId = prefix + num;
  const stulPlace = isVenku ? '🪟 Venku' : '🏠 Uvnitř';
  const stulFullName = (isVenku ? 'Venku' : 'Uvnitř') + ' – Stůl ' + num;

  document.getElementById('stul-place').textContent = stulPlace;
  document.getElementById('stul-name').textContent = 'Stůl ' + num;
  document.getElementById('stul-label').hidden = false;

  // --- Elements ---
  const callBtn = document.getElementById('call-btn');
  const callSub = document.getElementById('call-sub');
  const orderBtn = document.getElementById('order-btn');
  const historyBtn = document.getElementById('history-btn');
  const historyCountEl = document.getElementById('history-count');
  const status = document.getElementById('status-box');

  function setStatus(text, kind) {
    status.className = 'status-box ' + (kind || 'idle');
    status.textContent = text;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('screen-' + name).classList.add('active');
    window.scrollTo(0, 0);
  }

  // --- Anonymous auth ---
  setStatus('Připojuji se…', 'work');
  callSub.textContent = 'Připojuji…';

  let currentUid = null;
  signInAnonymously(auth).catch(function(e) {
    console.error('[auth] anonymous sign-in failed:', e);
    setStatus('Chyba spojení. Zkuste obnovit stránku.', 'err');
    callSub.textContent = 'Bez spojení';
  });

  onAuthStateChanged(auth, function(user) {
    if (user) {
      currentUid = user.uid;
      callBtn.disabled = false;
      orderBtn.disabled = false;
      callSub.textContent = stulFullName;
      setStatus('Připraveno', 'idle');
      attachHistoryListener();
    } else {
      currentUid = null;
      callBtn.disabled = true;
      orderBtn.disabled = true;
      callSub.textContent = 'Bez spojení';
      detachHistoryListener();
      historyBtn.hidden = true;
    }
  });

  // === Volání obsluhy (Fáze 1) ===
  let lastCallTs = 0;
  const COOLDOWN_MS = 30 * 1000;

  callBtn.addEventListener('click', async function() {
    if (callBtn.disabled) return;
    const now = Date.now();
    if (now - lastCallTs < COOLDOWN_MS) {
      const left = Math.ceil((COOLDOWN_MS - (now - lastCallTs)) / 1000);
      setStatus('Počkejte ještě ' + left + ' s…', 'work');
      return;
    }
    callBtn.disabled = true;
    setStatus('Posílám…', 'work');
    callSub.textContent = 'Posílám volání…';
    try {
      await addDoc(collection(db, 'volani'), { stul: stulId, status: 'active', ts: serverTimestamp() });
      lastCallTs = Date.now();
      setStatus('✓ Obsluha přijde za chvíli', 'ok');
      callSub.textContent = 'Volání odesláno';
      setTimeout(function() {
        callBtn.disabled = false;
        callSub.textContent = stulFullName;
        setStatus('Připraveno', 'idle');
      }, COOLDOWN_MS);
    } catch (e) {
      console.error('[volani] addDoc failed:', e);
      callBtn.disabled = false;
      callSub.textContent = stulFullName;
      setStatus('Nepodařilo se odeslat. Zkuste znovu.', 'err');
    }
  });

  // === MENU + KOŠÍK (Fáze 3) ===
  let cart = {};
  let currentCategory = null;

  function cartCount()  { let n = 0; for (const k in cart) n += cart[k].pocet; return n; }
  function cartPrice()  { let p = 0; for (const k in cart) p += cart[k].pocet * cart[k].cena; return p; }

  function updateCartCounters() {
    const cnt = cartCount();
    const price = cartPrice();
    // Menu screen
    document.getElementById('menu-cart-count').textContent = cnt;
    document.getElementById('menu-cart-chip').disabled = cnt === 0;
    document.getElementById('menu-cta').hidden = cnt === 0;
    document.getElementById('menu-cta-count').textContent = cnt;
    document.getElementById('menu-cta-price').textContent = price;
    // Category screen
    document.getElementById('cat-cart-count').textContent = cnt;
    document.getElementById('cat-cart-chip').disabled = cnt === 0;
    document.getElementById('cat-cta').hidden = cnt === 0;
    document.getElementById('cat-cta-count').textContent = cnt;
    document.getElementById('cat-cta-price').textContent = price;
    // Cart screen
    document.getElementById('cart-send-price').textContent = price;
    // Update badges na pivech/kategoriích (menu screen)
    document.querySelectorAll('#menu-body .pivo-btn').forEach(function(el) {
      const nazev = el.dataset.nazev;
      const inCart = cart[nazev] ? cart[nazev].pocet : 0;
      let badge = el.querySelector('.pivo-badge');
      if (inCart > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'pivo-badge'; el.appendChild(badge); }
        badge.textContent = inCart;
      } else if (badge) { badge.remove(); }
    });
    document.querySelectorAll('#menu-body .cat-btn').forEach(function(el) {
      const cat = el.dataset.cat;
      let cnt2 = 0;
      MENU.forEach(function(m) { if (m.c === cat && cart[m.n]) cnt2 += cart[m.n].pocet; });
      let badge = el.querySelector('.cat-badge');
      if (cnt2 > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'cat-badge'; el.appendChild(badge); }
        badge.textContent = cnt2;
      } else if (badge) { badge.remove(); }
    });
    // Update badges na položkách kategorie (category screen)
    document.querySelectorAll('#cat-body .menu-item').forEach(function(el) {
      const nazev = el.dataset.nazev;
      const inCart = cart[nazev] ? cart[nazev].pocet : 0;
      const addBtn = el.querySelector('.menu-add-btn');
      let badge = el.querySelector('.menu-item-badge');
      if (inCart > 0) {
        addBtn.classList.add('in-cart');
        if (!badge) {
          badge = document.createElement('span');
          badge.className = 'menu-item-badge';
          addBtn.parentNode.insertBefore(badge, addBtn);
        }
        badge.textContent = inCart;
      } else {
        addBtn.classList.remove('in-cart');
        if (badge) badge.remove();
      }
    });
  }

  function addToCart(item) {
    const key = item.nazev;
    if (!cart[key]) cart[key] = { nazev: item.nazev, cena: item.cena, pocet: 0 };
    cart[key].pocet++;
    updateCartCounters();
  }
  function changeCartQty(nazev, delta) {
    if (!cart[nazev]) return;
    cart[nazev].pocet += delta;
    if (cart[nazev].pocet <= 0) delete cart[nazev];
    updateCartCounters();
    renderCart();
  }
  function removeFromCart(nazev) {
    delete cart[nazev];
    updateCartCounters();
    renderCart();
  }

  // --- Render MENU (3 sekce: čepované, PET, kategorie) ---
  function renderMenu() {
    const body = document.getElementById('menu-body');
    let html = '';

    // 1) Čepovaná piva — barevný grid 2×4
    html += '<div class="menu-section">';
    html += '<div class="menu-section-label">Čepovaná piva</div>';
    html += '<div class="grid-2-tight">';
    BEERS_CEP.forEach(function(b) {
      const nazev = b.n;
      html += '<button class="pivo-btn ' + b.barva + '" data-nazev="' + escapeHtml(nazev) + '" data-cena="' + CEP_PRICE + '">' +
        '<span class="pivo-name">' + escapeHtml(nazev) + '</span>' +
        '<span class="pivo-price">' + CEP_PRICE + ' Kč · ' + CEP_VOLUME + '</span>' +
      '</button>';
    });
    html += '</div></div>';

    // 2) Pivo v PET — barevný grid 2×4
    html += '<div class="menu-section">';
    html += '<div class="menu-section-label">Pivo v PET</div>';
    html += '<div class="grid-2-tight">';
    BEERS_CEP.forEach(function(b) {
      const nazev = b.n + ' v PET';
      html += '<button class="pivo-btn ' + b.barva + '" data-nazev="' + escapeHtml(nazev) + '" data-cena="' + PET_PRICE + '">' +
        '<span class="pivo-name">' + escapeHtml(b.n) + '</span>' +
        '<span class="pivo-price">' + PET_PRICE + ' Kč · ' + PET_VOLUME + '</span>' +
      '</button>';
    });
    html += '</div></div>';

    // 3) Kategorie — grid 2 sloupce
    html += '<div class="menu-section">';
    html += '<div class="menu-section-label">Kategorie</div>';
    html += '<div class="grid-2">';
    CAT_ORDER.forEach(function(cat) {
      const items = MENU.filter(function(m) { return m.c === cat; });
      if (items.length === 0) return;
      html += '<button class="cat-btn" data-cat="' + escapeHtml(cat) + '">' +
        escapeHtml(cat) +
        '<span class="cat-count">' + items.length + ' položek</span>' +
      '</button>';
    });
    html += '</div></div>';

    body.innerHTML = html;
    updateCartCounters();
  }

  // --- Render CATEGORY (položky vybrané kategorie) ---
  function renderCategory(cat) {
    currentCategory = cat;
    document.getElementById('cat-title').textContent = cat;
    const body = document.getElementById('cat-body');
    const items = MENU.filter(function(m) { return m.c === cat; });
    let html = '';
    items.forEach(function(m) {
      html += '<div class="menu-item" data-nazev="' + escapeHtml(m.n) + '" data-cena="' + m.p + '">' +
        '<div class="menu-item-info">' +
          '<div class="menu-item-name">' + escapeHtml(m.n) + '</div>' +
          (m.u ? '<div class="menu-item-detail">' + escapeHtml(m.u) + '</div>' : '') +
        '</div>' +
        '<div class="menu-item-price">' + m.p + ' Kč</div>' +
        '<button class="menu-add-btn" aria-label="Přidat">+</button>' +
      '</div>';
    });
    body.innerHTML = html;
    updateCartCounters();
  }

  // --- Render CART ---
  function renderCart() {
    const body = document.getElementById('cart-body');
    const sendBar = document.getElementById('cart-send-bar');
    const keys = Object.keys(cart);
    if (keys.length === 0) {
      body.innerHTML = '<div class="cart-empty">Košík je prázdný.<br>Vrať se do menu a vyber si.</div>';
      sendBar.hidden = true;
      return;
    }
    sendBar.hidden = false;
    let html = '';
    keys.forEach(function(k) {
      const it = cart[k];
      html += '<div class="cart-item" data-nazev="' + escapeHtml(k) + '">' +
        '<div class="cart-item-top">' +
          '<div class="cart-item-name">' + escapeHtml(it.nazev) + '</div>' +
          '<div class="cart-item-price">' + (it.cena * it.pocet) + ' Kč</div>' +
        '</div>' +
        '<div class="cart-item-controls">' +
          '<button class="qty-btn qty-minus">−</button>' +
          '<div class="qty-value">' + it.pocet + '</div>' +
          '<button class="qty-btn qty-plus">+</button>' +
          '<div class="qty-spacer"></div>' +
          '<button class="remove-btn">Odebrat</button>' +
        '</div>' +
      '</div>';
    });
    html += '<div class="cart-total">' +
      '<div class="cart-total-label">Celkem</div>' +
      '<div class="cart-total-value">' + cartPrice() + ' Kč</div>' +
    '</div>';
    body.innerHTML = html;
  }

  // === HISTORY — moje objednávky (real-time listener) ===
  let historyUnsub = null;
  let historyItems = [];
  let editMode = false; // pokud true, po odeslání smaž starou objednávku
  let editOrigId = null;

  function attachHistoryListener() {
    if (historyUnsub || !currentUid) return;
    // Query: createdBy == uid (filtrace status v JS, abychom se vyhli composite indexu)
    const q = query(collection(db, 'objednavky'), where('createdBy', '==', currentUid));
    historyUnsub = onSnapshot(q, function(snap) {
      const items = [];
      snap.forEach(function(d) {
        const data = d.data();
        if (data.status !== 'active') return;
        items.push({
          id: d.id,
          stul: data.stul,
          polozky: Array.isArray(data.polozky) ? data.polozky : [],
          ts: data.ts ? data.ts.toMillis() : null
        });
      });
      items.sort(function(a, b) { return (a.ts || 0) - (b.ts || 0); });
      historyItems = items;
      updateHistoryUI();
    }, function(err) {
      console.warn('[history] listener error:', err);
    });
  }
  function detachHistoryListener() {
    if (historyUnsub) { historyUnsub(); historyUnsub = null; }
    historyItems = [];
  }
  function updateHistoryUI() {
    const n = historyItems.length;
    if (n > 0) {
      historyBtn.hidden = false;
      historyCountEl.textContent = String(n);
    } else {
      historyBtn.hidden = true;
    }
    // Pokud jsem na history screen, re-renderuj
    if (document.getElementById('screen-history').classList.contains('active')) {
      renderHistory();
    }
  }
  function renderHistory() {
    const body = document.getElementById('history-body');
    if (historyItems.length === 0) {
      body.innerHTML = '<div class="history-empty">Žádné nevyřízené objednávky.</div>';
      return;
    }
    let html = '';
    historyItems.forEach(function(o) {
      const cas = o.ts ? new Date(o.ts).toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' }) : '?';
      const total = o.polozky.reduce(function(s, p) { return s + (p.cena || 0) * (p.pocet || 0); }, 0);
      const lines = o.polozky.map(function(p) {
        return '<div>' + (p.pocet || 1) + '× ' + escapeHtml(p.nazev || '?') + ' <span style="color:var(--muted);">(' + ((p.cena || 0) * (p.pocet || 1)) + ' Kč)</span></div>';
      }).join('');
      html += '<div class="history-item" data-id="' + o.id + '">' +
        '<div class="history-item-head">' +
          '<div>' +
            '<div style="font-size:15px;font-weight:600;">Stůl ' + escapeHtml(o.stul) + '</div>' +
            '<div class="history-item-meta">odeslána v ' + cas + '</div>' +
          '</div>' +
          '<div class="history-item-status">Čeká</div>' +
        '</div>' +
        '<div class="history-item-lines">' + lines + '</div>' +
        '<div class="history-item-total">Celkem: ' + total + ' Kč</div>' +
        '<div class="history-item-actions">' +
          '<button class="history-item-btn edit">✏ Upravit</button>' +
          '<button class="history-item-btn delete">🗑 Smazat</button>' +
        '</div>' +
      '</div>';
    });
    body.innerHTML = html;
  }

  async function editOrder(id) {
    const o = historyItems.find(function(x) { return x.id === id; });
    if (!o) return;
    if (!confirm('Načíst tuto objednávku do košíku k úpravě?\n\nPo odeslání bude původní objednávka nahrazena.')) return;
    // Načíst do košíku
    cart = {};
    o.polozky.forEach(function(p) {
      const key = p.nazev;
      cart[key] = { nazev: p.nazev, cena: p.cena || 0, pocet: p.pocet || 1 };
    });
    editMode = true;
    editOrigId = id;
    updateCartCounters();
    renderCart();
    showScreen('cart');
    // Update label
    document.getElementById('cart-send-label').innerHTML = '📤 Odeslat upravenou objednávku';
  }

  async function deleteOrder(id) {
    if (!confirm('Opravdu smazat tuto objednávku?\nObsluhu se k vám pošle, jen pokud ji odešlete znovu.')) return;
    try {
      await deleteDoc(doc(db, 'objednavky', id));
      // Listener automaticky update history
    } catch (e) {
      console.error('[history] delete failed:', e);
      alert('Smazání selhalo: ' + (e.message || e.code));
    }
  }

  // --- Event listeners ---
  orderBtn.addEventListener('click', function() {
    if (orderBtn.disabled) return;
    renderMenu();
    showScreen('menu');
  });
  historyBtn.addEventListener('click', function() {
    renderHistory();
    showScreen('history');
  });

  document.getElementById('menu-back-btn').addEventListener('click', function() { showScreen('home'); });
  document.getElementById('cat-back-btn').addEventListener('click', function() { showScreen('menu'); });
  document.getElementById('cart-back-btn').addEventListener('click', function() {
    showScreen(currentCategory ? 'category' : 'menu');
  });
  document.getElementById('history-back-btn').addEventListener('click', function() { showScreen('home'); });

  // Cart chip / CTA → cart
  ['menu-cart-chip', 'menu-cta-btn', 'cat-cart-chip', 'cat-cta-btn'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('click', function() {
      if (el.disabled) return;
      renderCart();
      showScreen('cart');
    });
  });

  // Menu body: klik na pivo / kategorii
  document.getElementById('menu-body').addEventListener('click', function(e) {
    const pivoBtn = e.target.closest('.pivo-btn');
    if (pivoBtn) {
      const nazev = pivoBtn.dataset.nazev;
      const cena = parseInt(pivoBtn.dataset.cena, 10) || 0;
      addToCart({ nazev: nazev, cena: cena });
      pivoBtn.style.transform = 'scale(.92)';
      setTimeout(function() { pivoBtn.style.transform = ''; }, 120);
      return;
    }
    const catBtn = e.target.closest('.cat-btn');
    if (catBtn) {
      renderCategory(catBtn.dataset.cat);
      showScreen('category');
      return;
    }
  });

  // Category body: klik na položku +
  document.getElementById('cat-body').addEventListener('click', function(e) {
    const addBtn = e.target.closest('.menu-add-btn');
    if (!addBtn) return;
    const itemEl = addBtn.closest('.menu-item');
    if (!itemEl) return;
    const nazev = itemEl.dataset.nazev;
    const cena = parseInt(itemEl.dataset.cena, 10) || 0;
    addToCart({ nazev: nazev, cena: cena });
    addBtn.style.transform = 'scale(.85)';
    setTimeout(function() { addBtn.style.transform = ''; }, 120);
  });

  // Cart body: -, +, odebrat
  document.getElementById('cart-body').addEventListener('click', function(e) {
    const itemEl = e.target.closest('.cart-item');
    if (!itemEl) return;
    const nazev = itemEl.dataset.nazev;
    if (e.target.closest('.qty-minus')) changeCartQty(nazev, -1);
    else if (e.target.closest('.qty-plus')) changeCartQty(nazev, 1);
    else if (e.target.closest('.remove-btn')) removeFromCart(nazev);
  });

  // History body: edit / delete (delegated)
  document.getElementById('history-body').addEventListener('click', function(e) {
    const itemEl = e.target.closest('.history-item');
    if (!itemEl) return;
    const id = itemEl.dataset.id;
    if (e.target.closest('.edit')) editOrder(id);
    else if (e.target.closest('.delete')) deleteOrder(id);
  });

  // --- Odeslání objednávky ---
  const sendBtn = document.getElementById('cart-send-btn');
  const sendLabel = document.getElementById('cart-send-label');
  sendBtn.addEventListener('click', async function() {
    if (sendBtn.disabled) return;
    const keys = Object.keys(cart);
    if (keys.length === 0) return;
    if (!currentUid) { alert('Nepřipojeno. Obnov stránku.'); return; }

    sendBtn.disabled = true;
    sendLabel.textContent = '⏳ Odesílám…';

    const polozky = keys.map(function(k) {
      return { nazev: cart[k].nazev, pocet: cart[k].pocet, cena: cart[k].cena };
    });

    try {
      await addDoc(collection(db, 'objednavky'), {
        stul: stulId,
        polozky: polozky,
        status: 'active',
        ts: serverTimestamp(),
        createdBy: currentUid
      });
      // Pokud byla edit, smaž původní
      if (editMode && editOrigId) {
        try { await deleteDoc(doc(db, 'objednavky', editOrigId)); }
        catch(e) { console.warn('[edit] delete orig failed:', e); }
      }
      editMode = false;
      editOrigId = null;
      cart = {};
      updateCartCounters();
      document.getElementById('sent-msg').textContent =
        polozky.length === 1
          ? 'Obsluha vám brzy přinese ' + polozky[0].nazev + '.'
          : 'Obsluha vám brzy přinese ' + polozky.length + ' položek z menu.';
      sendLabel.innerHTML = '📤 Odeslat objednávku';
      showScreen('sent');
    } catch (e) {
      console.error('[objednavky] addDoc failed:', e);
      sendBtn.disabled = false;
      sendLabel.innerHTML = editMode ? '📤 Odeslat upravenou objednávku' : '📤 Odeslat objednávku';
      alert('Odeslání selhalo: ' + (e.message || e.code) + '\n\nZkuste prosím znovu.');
    } finally {
      sendBtn.disabled = false;
    }
  });

  document.getElementById('sent-back-btn').addEventListener('click', function() {
    showScreen('home');
    sendBtn.disabled = false;
    sendLabel.innerHTML = '📤 Odeslat objednávku';
  });
</script>

</body>
</html>
